<head>
  <meta charset="UTF-8">
  <title>Rwanda for All</title>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <h1>Rwanda for All</h1>
    <p>Preserving and transparently verifying Rwandan stories.</p>

    <div class="auth-buttons">
      <button id="submitStoryBtn">Submit Story</button>
    </div>
  </section>

  <!-- CATEGORY CARDS -->
  <section class="cards">
    <div class="card" data-category="Stories">Stories</div>
    <div class="card" data-category="History & Heritage">History & Heritage</div>
    <div class="card" data-category="Family Lineage">Family Lineage</div>
  </section>

  <!-- STORY DISPLAY -->
  <section id="contentView" class="hidden">
    <button id="backBtn">← Back</button>
    <h2 id="sectionTitle"></h2>
    <div id="sectionContent"></div>
  </section>

  <!-- ✅ NEW: SUBMIT FORM -->
  <section id="submitStoryView" class="hidden">
    <button id="submitBackBtn">← Back</button>

    <h2>Submit a Story</h2>

    <form id="storyForm" enctype="multipart/form-data">
      <input type="text" name="title" placeholder="Story title" required />
      <input type="text" name="category" placeholder="Category" required />
      <textarea name="content" placeholder="Your story" required></textarea>

      <label>Storyteller Photo (optional)</label>
      <input type="file" name="storyteller_photo" />

      <button type="submit">Submit</button>
    </form>
  </section>

  <script src="script.js"></script>
</body>
